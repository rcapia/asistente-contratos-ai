<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚖️ Asistente de Contratos AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(31, 41, 55, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-black to-blue-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-3xl glass p-8 rounded-3xl shadow-2xl border border-gray-700">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                Consultoría de Contratos AI
            </h1>
            <p class="text-gray-400 mt-2">Análisis inteligente de saldos, monedas y cláusulas contractuales</p>
        </header>
        
        <div class="space-y-4">
            <label class="block text-sm font-medium text-gray-300 ml-1">Tu consulta:</label>
            <textarea id="pregunta" 
                class="w-full h-44 p-4 bg-gray-950 rounded-2xl border border-gray-700 focus:ring-2 focus:ring-blue-500 focus:border-transparent text-gray-200 placeholder-gray-600 outline-none transition-all resize-none"
                placeholder="Ej: ¿Cuáles son las obligaciones del contratante en el contrato de servicios de la cartera en USD?"></textarea>
            
            <button onclick="enviarConsulta()" id="btn"
                class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-500 hover:to-blue-600 text-white font-bold py-4 rounded-2xl transition-all transform hover:scale-[1.01] active:scale-95 shadow-lg flex items-center justify-center gap-2">
                <span id="btn-text">Consultar a Mistral GGUF</span>
                <div id="spinner" class="hidden border-4 border-t-transparent border-white rounded-full w-5 h-5 animate-spin"></div>
            </button>
        </div>

        <div id="loading" class="hidden mt-6 text-center">
            <div class="flex items-center justify-center gap-3 text-blue-400 font-medium">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
                </span>
                Procesando con Inteligencia Artificial...
            </div>
        </div>
        
        <div id="resultado-container" class="mt-8 hidden animate-fade-in">
            <h3 class="text-sm font-semibold text-blue-400 mb-2 uppercase tracking-wider ml-1">Respuesta del Asistente:</h3>
            <div id="resultado" class="p-6 bg-gray-900/80 rounded-2xl border border-blue-500/30 text-gray-200 leading-relaxed shadow-inner">
                </div>
        </div>
    </div>

    <script>
        async function enviarConsulta() {
            const pregunta = document.getElementById('pregunta').value;
            const resDiv = document.getElementById('resultado');
            const resContainer = document.getElementById('resultado-container');
            const btn = document.getElementById('btn');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('spinner');
            const loading = document.getElementById('loading');

            if(!pregunta) {
                alert("Por favor, escribe una pregunta para el asistente.");
                return;
            }

            // UI: Estado de carga
            btn.disabled = true;
            btnText.innerText = "Procesando...";
            spinner.classList.remove('hidden');
            loading.classList.remove('hidden');
            resContainer.classList.add('hidden');

            try {
                // IMPORTANTE: Asegúrate que tu Space de HF esté corriendo con FastAPI
                const URL_API = 'https://rcapia-mi-asistente-contratos.hf.space/consultar';

                const response = await fetch(URL_API, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ pregunta: pregunta })
                });
                
                if (!response.ok) {
                    throw new Error("El servidor está ocupado o cargando el modelo.");
                }

                const data = await response.json();
                
                // Mostrar resultado
                resDiv.innerText = data.respuesta;
                resContainer.classList.remove('hidden');
                
            } catch (error) {
                resDiv.innerHTML = `<span class="text-red-400">⚠️ Error de conexión:</span> El servidor de IA está iniciando (puede tardar 1-2 min por el archivo GGUF) o la URL es incorrecta. Por favor, intenta de nuevo en unos instantes.`;
                resContainer.classList.remove('hidden');
                console.error("Detalle del error:", error);
            } finally {
                // UI: Restaurar estado
                btn.disabled = false;
                btnText.innerText = "Consultar a Mistral GGUF";
                spinner.classList.add('hidden');
                loading.classList.add('hidden');
            }
        }
    </script>

    <style>
        @keyframes fade-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fade-in 0.5s ease-out forwards; }
    </style>
</body>
</html>
